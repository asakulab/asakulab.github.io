        <div class="mainG">
            <div id="chartContainer">
    <!-- グラフを表示するコンテナ -->
            <canvas id="myLineChart"></canvas>
            </div>
    <!-- Chart.jsを読み込む -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0"></script>
    
    <script>
        // グラフのデータ
        var data = {
            labels: ["09/07", "09/08", "09/09", "09/10", "09/11", "09/12", "09/13", "09/14", "09/15", "09/16"],
            datasets: [{
                label: "標的行動/回",
                data: [30, 25, 28, 24, 30, 20, 22, 27, 18, 20],
                borderColor: "blue",
                borderWidth: 2,
                fill: false
            },
        {
                    label: "時間/分",
                    data: [15, 17, 24, 21, 22, 10, 17, 19, 13, 17],
                    borderColor: "yellow",
                    borderWidth: 2,
                    fill: false
                },
            {
                    label: "気分",
                    data: [10, 15, 20, 25, 30, 10, 15, 20, 25, 30],
                    borderColor: "red",
                    borderWidth: 2,
                    fill: false
                }]
        };

        // グラフの設定
        var options = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        };

        // グラフを描画
        var ctx = document.getElementById('myLineChart').getContext('2d');
        var myLineChart = new Chart(ctx, {
            type: 'line',
            data: data,
            options: options
        });
    </script>

                </div>
<!-- タイマー -->
        <div class="timer">
    <!-- 時間 -->
            <span id="current-time" class="badge bg-primary display-4 ms-2" style="width: 240px;">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </span>
            
            <style>
                #current-time {
                    font-size: 2.5rem;
                    padding: 10px 20px;
                    display: inline-block;
                    text-align: center;
                    white-space: nowrap;
                    overflow: hidden;
                }
                #hours,
                #minutes,
                #seconds {
                    width: 60px;
                    /* 数字の幅を一定に設定 */
                    display: inline-block;
                }
            </style>
    <!-- ストップウォッチ -->
            <div class="container ms-3">
                <div class="stopwatch badge bg-info display-4 ms-1" style="width: 190px;">
                <span class="digit" id="hoursDisplay">00</span> :
                <span class="digit" id="minutesDisplay">00</span> :
                <span class="digit" id="secondsDisplay">00</span>
            </div>
            <div>
                <button class="btn btn-primary" id="startButton">始</button>
                <button class="btn btn-danger" id="stopButton">終</button>
                <button class="btn btn-warning" id="resetButton">リセ</button>
                <button class="btn btn-success" id="resetButton2">送信</button>
            </div>
                <style>
                    .stopwatch {
                        font-size: 1.5rem;
                    }
                    .digit {
                        width: 2rem;
                        /* 数字の幅を固定 */
                        text-align: center;
                        display: inline-block;
                        margin-right: 5px;
                    }
                </style>
        </div>
        </div>

            </div>
